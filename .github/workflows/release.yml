name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    concurrency:
      group: packager

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CurseForge API access
        shell: bash
        env:
          CF_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${CF_API_KEY:-}" ]; then
            echo "CURSEFORGE_API_KEY is empty or not configured."
            exit 1
          fi

          status=$(curl -sS -o cf_versions.json -w "%{http_code}" \
            -H "x-api-token: ${CF_API_KEY}" \
            "https://wow.curseforge.com/api/game/wow/versions")

          if [ "${status}" != "200" ]; then
            echo "CurseForge API preflight failed with HTTP ${status}."
            echo "Likely causes: invalid or revoked token, or wrong token type for BigWigs packager."
            echo "Response preview:"
            head -c 400 cf_versions.json || true
            echo
            exit 1
          fi

          echo "CurseForge API preflight passed."

      - name: Package and publish
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
